    - degree: Bachelors of Science
      university: University of Alberta
      time: 2010 - 2015
      details: |
        I graduated with a double major in Mathematics and Physics.
        I started in a Specilization Physics program, but switch to
        the double major path so I could learn a greater variety of topics
        during my studies I did two exchange programs to Trinidad and Tobago,
        and Turkey
          - 3.1 GPA
          - Graduated with a double major
    - degree: High School Diploma
      university: Paul Kane High School
      time: 2005 - 2008
      details: |
        Almost all my core classes were Advanced Placement, I finished each year with 
        honors. I scored very high on the Pascal test and got a 5 (top score) on the advanced
        placement Mathamatics test.
          - Graduated with honors
          - Advanced placement program
experiences:
    - role: Online ESL Teacher
      time: 2015 - Aug 2019
      company: DaDa ABC & Kuresel Dil & A Small, Private ESL Company.
      details: |
        I have taught online ESL for many years, and worked for three different companies. Kuresel Dil
        is a Turkish company where I taught advanced level adult Engineers. This position focused on 
        advanced grammar and idioms. DaDa ABC I taught students below the age of 18, the levels ranged
        from babies as young as 4 to teens learning advanced topics. The third company I worked for was
        a small start up in China, the students here were children, but generally with Advanced English levels.
          - Engaging students and matching many ability levels
          - Preparing props and materials for lessons as needed. Tailoring lessons to students' abilities. 
    - role: In class English Teacher.
      time: 2015 - 2017 
      company: Berlitz, Active English, Fengshang & Schoolhouse Language School.
      details: |
        I taught English in two schools in Turkey and two schools in Taiwan. At Berlitz I taught adults using
        their strict teaching methodology, the other positions involved teaching children. Each school had
        different curriculum and requirements, so I adapted my methods to match the material and meet the needs
        of the different age groups being taught. 
          - Preparing Lessons and material
          - Teaching many age groups
          - Managing classroom discipline
        
