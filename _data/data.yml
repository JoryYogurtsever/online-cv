career-profile:
    title: Career Profile
    summary: |
      I have been working as an ESL Teacher for 5 years, both in the classroom and online. 
      I have taught young children, adults and young adults. I love teaching and
      have developed a fascination with English grammar. I believe in the Presentation, Practice,
      Performance method of teaching, but have used many other approaches and have learned how to adapt
      my teaching style quickly to different learners. I look forward to continuing my career in this
      rewarding industry.
